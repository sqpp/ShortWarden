services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: shortwarden
      POSTGRES_PASSWORD: shortwarden
      POSTGRES_DB: shortwarden
    # No host port published to avoid conflicts; API/migrate reach it via the docker network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortwarden -d shortwarden"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - shortwarden_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ./Dockerfile.api
    environment:
      SHORTWARDEN_HTTP_ADDR: ":8080"
      SHORTWARDEN_POSTGRES_DSN: "postgres://shortwarden:shortwarden@db:5432/shortwarden?sslmode=disable"
      SHORTWARDEN_JWT_SECRET: "change-me"
      SHORTWARDEN_PUBLIC_BASE_URL: "http://brohosting.space"
      SHORTWARDEN_COOKIE_SECURE: "0"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  migrate:
    build:
      context: .
      dockerfile: ./Dockerfile.api
    environment:
      SHORTWARDEN_POSTGRES_DSN: "postgres://shortwarden:shortwarden@db:5432/shortwarden?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/app/migrate"]
    command: ["-dir", "/app/db/migrations"]

  nginx:
    build:
      context: ./nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      # Serve the built Vue app (run `npm run build` in ./frontend first)
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  shortwarden_pgdata:

