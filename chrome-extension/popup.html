<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShortWarden</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, Segoe UI, sans-serif; margin: 0; padding: 12px; width: 360px; background:#020617; color:#e2e8f0; }
      label { display: block; font-size: 11px; font-weight: 700; margin-top: 10px; color:#94a3b8; letter-spacing:.06em; text-transform:uppercase; }
      input, select { width: 100%; padding: 9px 10px; margin-top: 6px; box-sizing: border-box; background:#020617; border:1px solid #1f2937; border-radius:8px; color:#e2e8f0; }
      input::placeholder { color:#64748b; }
      .btn { width: 100%; margin-top: 12px; padding: 10px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; font-weight:600; }
      .btn:hover { background:#111a2b; }
      .btnPrimary { background:#a3e635; color:#0b1220; border-color:rgba(163,230,53,.45); }
      .btnPrimary:hover { background:#bef264; }
      .btnIcon { width:auto; margin-top:0; padding:8px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:#e2e8f0; }
      .btnIcon:hover { background:#111a2b; }
      .msg { margin-top: 10px; font-size: 12px; white-space: pre-wrap; color:#cbd5e1; }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      .hint { font-size: 12px; color: #94a3b8; }
      .warn { margin-top:10px; padding:8px 10px; border-radius:10px; border:1px solid rgba(239,68,68,.35); background:rgba(127,29,29,.28); color:#fecaca; font-size:12px; }
      .top { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
      .brand { font-size:12px; font-weight:700; letter-spacing:.04em; }
      .actions { display:flex; gap:8px; }
      svg { width:16px; height:16px; display:block; }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="brand">ShortWarden</div>
      <div class="actions">
        <button id="openApp" class="btnIcon" title="Open ShortWarden" aria-label="Open ShortWarden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 3h7v7"></path>
            <path d="M10 14L21 3"></path>
            <path d="M21 14v7h-7"></path>
            <path d="M3 10V3h7"></path>
            <path d="M3 14v7h7"></path>
          </svg>
        </button>
        <button id="openOptions" class="btnIcon" title="Options" aria-label="Options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path>
            <path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1a2 2 0 0 1-1.4 3.4h-.2a2 2 0 0 1-1.8-1.1l-.1-.2a1.8 1.8 0 0 0-2.1-.8 1.8 1.8 0 0 0-1.3 1.7V23a2 2 0 0 1-4 0v-.2a1.8 1.8 0 0 0-1.3-1.7 1.8 1.8 0 0 0-2.1.8l-.1.2A2 2 0 0 1 3.5 20.6h-.2A2 2 0 0 1 1.9 17l.1-.1a1.8 1.8 0 0 0 .4-2 1.8 1.8 0 0 0-1.6-1H.8a2 2 0 0 1 0-4H.8a1.8 1.8 0 0 0 1.6-1 1.8 1.8 0 0 0-.4-2l-.1-.1A2 2 0 0 1 3.3 1.4h.2a2 2 0 0 1 1.8 1.1l.1.2a1.8 1.8 0 0 0 2.1.8A1.8 1.8 0 0 0 8.8 1.8V1a2 2 0 0 1 4 0v.2a1.8 1.8 0 0 0 1.3 1.7 1.8 1.8 0 0 0 2.1-.8l.1-.2A2 2 0 0 1 20.5 3.4h.2A2 2 0 0 1 22.1 7l-.1.1a1.8 1.8 0 0 0-.4 2 1.8 1.8 0 0 0 1.6 1h.2a2 2 0 0 1 0 4h-.2a1.8 1.8 0 0 0-1.6 1z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="apiWarn" class="warn" style="display:none;">
      Missing/invalid API key. Set one in Options.
    </div>

    <label>URL</label>
    <input id="url" />

    <div class="row">
      <div>
        <label>Alias (optional)</label>
        <input id="alias" placeholder="my-alias" />
      </div>
      <div>
        <label>Expiry</label>
        <select id="expiryPreset">
          <option value="">No expiry</option>
          <option value="5m">5 minutes</option>
          <option value="15m">15 minutes</option>
          <option value="30m">30 minutes</option>
          <option value="1h">1 hour</option>
          <option value="6h">6 hours</option>
          <option value="24h">24 hours</option>
          <option value="3d">3 days</option>
          <option value="7d">7 days</option>
          <option value="1mo">1 month</option>
          <option value="custom">Custom (RFC3339)</option>
        </select>
        <input id="expires" placeholder="2026-12-31T00:00:00Z" style="display:none;margin-top:8px;" />
      </div>
    </div>

    <label>Domain</label>
    <select id="domain">
      <option value="">Use primary domain</option>
    </select>

    <button id="shorten" class="btn btnPrimary">Create short link</button>

    <div id="msg" class="msg"></div>
    <script src="popup.js"></script>
  </body>
</html>
