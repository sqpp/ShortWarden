worker_processes  1;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  # Allow large imports if needed
  client_max_body_size 20m;

  upstream shortwarden_api {
    # In docker-compose, the API service name is "api"
    server api:8080;
  }

  server {
    listen 80;

    # Add your verified domains here (space-separated). You can also use wildcards.
    # Example: server_name brohosting.space www.brohosting.space;
    server_name _;

    # Serve frontend build (Vue)
    root /usr/share/nginx/html;
    index index.html;

    # API + redirect endpoints -> Go backend
    location /v1/ {
      proxy_pass http://shortwarden_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /r/ {
      proxy_pass http://shortwarden_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /preview/ {
      proxy_pass http://shortwarden_api;
      proxy_read_timeout 60s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.yaml {
      proxy_pass http://shortwarden_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /docs {
      proxy_pass http://shortwarden_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /docs/ {
      proxy_pass http://shortwarden_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback (Vue Router)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}

